<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo Terra Girando</title>
  
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #0a001f 0%, #000814 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 320px;
      height: 320px;
      text-align: center;
    }

    .earth {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: url('https://images.unsplash.com/photo-1564053489984-317bbd824ace?w=800') center/cover;
      box-shadow: 
        0 0 60px rgba(100, 180, 255, 0.7),
        inset 0 0 80px rgba(0, 0, 0, 0.6);
      animation: spin 24s linear infinite;
    }

    .text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 3.8rem;
      font-weight: bold;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 30px #00ffff,
        0 0 60px #00aaff;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="earth"></div>
    <div class="text">Olá Mundo</div>
  </div>

</body>
</html>
